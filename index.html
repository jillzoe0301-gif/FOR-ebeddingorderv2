<script type="module">
import { createClient } from '@supabase/supabase-js';

(function(){
'use strict';

let buttonPointerGuard = null;
document.addEventListener('pointerdown', e=>{
  const btn = e.target && e.target.closest ? e.target.closest('button') : null;
  buttonPointerGuard = btn ? {btn, x:e.clientX, y:e.clientY, moved:false} : null;
}, true);
document.addEventListener('pointermove', e=>{
  if(!buttonPointerGuard) return;
  if(Math.abs(e.clientX - buttonPointerGuard.x) > 7 || Math.abs(e.clientY - buttonPointerGuard.y) > 7){
    buttonPointerGuard.moved = true;
  }
}, true);
document.addEventListener('click', e=>{
  const btn = e.target && e.target.closest ? e.target.closest('button') : null;
  if(buttonPointerGuard && buttonPointerGuard.moved && btn === buttonPointerGuard.btn){
    e.preventDefault();
    e.stopImmediatePropagation();
  }
  buttonPointerGuard = null;
}, true);

const STORAGE_KEY = 'for_e_bedding_order_system_v3_1_20260711';
const pages = [
  {id:'orders', label:'寢具訂購'},
  {id:'records', label:'訂購紀錄'},
  {id:'accounting', label:'會計對帳'},
  {id:'inventory', label:'庫存管理'},
  {id:'stats', label:'統計報表'},
  {id:'control', label:'控管資訊'},
  {id:'settings', label:'資料設定'}
];

const supabase = SUPABASE_URL && SUPABASE_ANON_KEY

  : null;
const CLIENT_ID_KEY = 'for_e_bedding_client_id';
const CLIENT_ID = sessionStorage.getItem(CLIENT_ID_KEY) || (globalThis.crypto?.randomUUID?.() || ('client-' + Date.now() + '-' + Math.random().toString(36).slice(2)));
sessionStorage.setItem(CLIENT_ID_KEY, CLIENT_ID);

let state = loadState();
let remoteRevision = 0;
let lastSharedJSON = '';
let remoteSaveTimer = null;
let remoteSaving = false;
let remoteSaveQueued = false;
let remoteConflict = false;
let stateChannel = null;

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return defaultState();
    return normalizeState(JSON.parse(raw));
  }catch(err){
    console.warn(err);
    return defaultState();
  }
}
function sharedStatePayload(){
  return {
    settings: state.settings,
    orders: state.orders,
    stockAdjustments: state.stockAdjustments,
    deletedOrders: state.deletedOrders,
    auditLogs: state.auditLogs
  };
}
function sharedJSON(){ return JSON.stringify(sharedStatePayload()); }
function setSyncStatus(status, label){
  const dot = document.querySelector('#syncDot');
  const text = document.querySelector('#syncLabel');
  if(dot){ dot.className = 'sync-dot' + (status==='saving'?' saving':status==='error'?' error':''); }
  if(text) text.textContent = label || (status==='saving'?'同步中':'已同步');
}
function applyRemoteState(data, revision){
  const localUI = {currentPage:state.currentPage, filters:state.filters};
  state = normalizeState(Object.assign(defaultState(), data || {}, localUI));
  remoteRevision = Number(revision || 0);
  lastSharedJSON = sharedJSON();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  remoteConflict = false;
}
async function loadRemoteState(){
  const {data, error} = await supabase.from('app_state').select('data, revision').eq('id', APP_STATE_ID).single();
  if(error) throw error;
  applyRemoteState(data?.data || {}, data?.revision || 0);
}
function scheduleRemoteSave(){
  if(!supabase || remoteConflict) return;
  const nextJSON = sharedJSON();
  if(nextJSON === lastSharedJSON) return;
  clearTimeout(remoteSaveTimer);
  setSyncStatus('saving','等待同步');
  remoteSaveTimer = setTimeout(persistRemoteState, 450);
}
async function persistRemoteState(){
  if(remoteSaving){ remoteSaveQueued = true; return; }
  const nextJSON = sharedJSON();
  if(nextJSON === lastSharedJSON){ setSyncStatus('ok','已同步'); return; }
  remoteSaving = true;
  setSyncStatus('saving','同步中');
  try{
    const {data, error} = await supabase.rpc('save_bedding_state', {
      p_data: JSON.parse(nextJSON),
      p_expected_revision: remoteRevision,
      p_client_id: CLIENT_ID
    });
    if(error) throw error;
    if(!data?.success){
      remoteConflict = true;
      remoteRevision = Number(data?.revision || remoteRevision);
      setSyncStatus('error','版本衝突，請重新整理');
      alert('資料已被其他使用者更新。為避免覆蓋他人資料，這次變更尚未寫入 Supabase。請先下載備份 JSON，再重新整理後重做本次操作。');
      return;
    }
    remoteRevision = Number(data.revision || remoteRevision + 1);
    lastSharedJSON = nextJSON;
    setSyncStatus('ok','已同步');
  }catch(err){
    console.error(err);
    setSyncStatus('error','同步失敗');
    toast('Supabase 同步失敗，資料暫存在此瀏覽器');
  }finally{
    remoteSaving = false;
    if(remoteSaveQueued){ remoteSaveQueued = false; scheduleRemoteSave(); }
  }
}
function subscribeRemoteState(){
  if(stateChannel) supabase.removeChannel(stateChannel);
  stateChannel = supabase.channel('bedding-app-state')
    .on('postgres_changes', {event:'UPDATE', schema:'public', table:'app_state', filter:`id=eq.${APP_STATE_ID}`}, payload=>{
      const row = payload.new || {};
      if(row.updated_by === CLIENT_ID) return;
      if(sharedJSON() !== lastSharedJSON || remoteSaving){
        remoteConflict = true;
        setSyncStatus('error','有其他人更新，請重新整理');
        return;
      }
      applyRemoteState(row.data || {}, row.revision || remoteRevision);
      render();
      toast('已同步其他使用者的最新資料');
    })
    .subscribe();
}
function normalizeStatusValue(v){
  if(['已下單','已收貨','待請款','待對帳','對帳完成','帳務錯誤'].includes(v)) return v;
  if(['已建立','待確認','取消'].includes(v)) return '已下單';
  if(['部分收貨'].includes(v)) return '已收貨';
  if(['待會計對帳'].includes(v)) return '待對帳';
  if(['已結案','已確認帳款'].includes(v)) return '對帳完成';
  if(['帳務錯誤待處理','帳戶錯誤'].includes(v)) return '帳務錯誤';
  return '已下單';
}
function normalizeAccountingStatusValue(v, hasBatch){
  if(v==='已確認帳款') return '對帳完成';
  if(v==='帳務錯誤') return '帳務錯誤';
  if(v==='待對帳') return '待對帳';
  return hasBatch ? '待對帳' : '未轉入';
}

}
function normalizeItemLine(line){
  const item=getItem(line?.code);
  return {
    code: line?.code || item.code,
    price: num(line?.price ?? item.price),
    orderQty: num(line?.orderQty),
    addQty: num(line?.addQty),
    returnQty: num(line?.returnQty),

    stockInQty: num(line?.stockInQty),

  };
}
function workerGroupBlank(){

}
function orderWorkerGroups(o){
  if(!o || o.isStockOrder) return [];
  if(Array.isArray(o.workerGroups) && o.workerGroups.length){
    return o.workerGroups.map(g=>({
      id:g.id || uid('WG'),
      name:g.name || '',
      nationality:g.nationality || o.nationality || '越南',
      entryDate:g.entryDate || o.entryDate || '',
      items: mergeGroupItems(g.items || [])
    }));
  }
  const names = String(o.worker||'').split(/[\n、,，;；]+/).map(x=>x.trim()).filter(Boolean);
  const baseItems = (o.items||[]).length ? mergeGroupItems(o.items) : createEmptyItemLines(i=>isGeneralItem(i));
  if(names.length){
    return names.map((name,idx)=>({
      id:uid('WG'), name,
      nationality:o.nationality||'越南', entryDate:o.entryDate||'',
      items: baseItems.map(l=>Object.assign({}, l, idx===0 ? {} : {returnQty:0, returnToStockQty:0}))
    }));
  }
  return [{id:uid('WG'), name:o.worker||'', nationality:o.nationality||'越南', entryDate:o.entryDate||'', items:baseItems.filter(l=>isGeneralItem(l.code))}];
}
function mergeGroupItems(items){
  const old = new Map((items||[]).map(l=>[l.code,l]));
  return state.settings.items.filter(i=>i.active!==false && isGeneralItem(i)).map(i=>normalizeItemLine(old.get(i.code) || {code:i.code, price:i.price}));
}
function aggregateWorkerItems(groups, oldItems=[]){
  const oldMap = new Map((oldItems||[]).map(l=>[l.code,l]));
  const map = new Map(state.settings.items.filter(i=>i.active!==false).map(i=>[i.code, normalizeItemLine(oldMap.get(i.code) || {code:i.code, price:i.price})]));
  map.forEach(l=>{ l.orderQty=0; l.addQty=0; l.useStockQty=0; l.stockInQty=0; l.replenishQty=0; l.receivedQty=0; l.note=''; });
  (groups||[]).forEach(g=>{
    (g.items||[]).forEach(raw=>{
      const l=normalizeItemLine(raw); if(!map.has(l.code)) map.set(l.code, normalizeItemLine(l));
      const target=map.get(l.code);
      target.price = num(l.price || target.price);
      target.orderQty += num(l.orderQty);
      target.addQty += num(l.addQty);
      target.useStockQty += num(l.useStockQty);
      target.stockInQty += num(l.stockInQty);
      target.replenishQty += num(l.replenishQty);
      target.receivedQty += num(l.receivedQty);

function lineQty(line){
  if(isSpecialItem(line?.code)) return Math.max(0, num(line?.orderQty));

function supplierQty(line){

function itemSummary(order){

function purchaseItemsHTML(order){

function hasOrderLineForPrint(line){ return supplierQty(line)>0 || num(line.useStockQty)>0; }
function hasReceiptLine(line){ return lineQty(line)>0; }
function returnableQty(line){ return isSpecialItem(line?.code) ? 0 : Math.max(0, num(line.orderQty) + num(line.addQty) + num(line.useStockQty) - num(line.returnQty)); }
function hasReturnableItems(order){ return (order.items||[]).some(l=>isGeneralItem(l.code) && returnableQty(l)>0); }
function currentStock(code){
  const item = getItem(code);
  if(isSpecialItem(item)) return 0;
  let stock = num(item.openingStock);
  for(const order of state.orders){
    for(const l of (order.items||[])){
      if(l.code !== code) continue;
      if(order.isStockOrder && order.receivedDate){
        stock += Math.max(0, num(l.orderQty) + num(l.addQty) - num(l.returnQty));
      }
      stock += num(l.stockInQty || 0);
      stock += num(l.replenishQty || 0);
      stock += num(l.returnToStockQty || 0);
      stock -= num(l.useStockQty);
    }
  }
  for(const adj of state.stockAdjustments){
    if(adj.code===code) stock += num(adj.qty);
  }
  return stock;
}

function toggleStockOrderFields(modal){

function deliveryHourLabel(hour){
  const h = num(hour);
  if(!h) return '';
  const period = h < 12 ? '上午' : '下午';
  const display = h === 12 ? 12 : (h > 12 ? h - 12 : h);

function normalizeSpecialLine(line){
  const l=normalizeItemLine(line||{});
  const qty=Math.max(0,num(l.orderQty)+num(l.addQty)+num(l.useStockQty)-num(l.returnQty));
  return Object.assign(l,{orderQty:qty,addQty:0,returnQty:0,useStockQty:0,stockInQty:0,replenishQty:0,returnToStockQty:0,receivedQty:0});
}

    return `<tr data-code="${esc(item.code)}">

function positiveLineQty(line){ return isSpecialItem(line?.code) ? num(line?.orderQty)>0 : (supplierQty(line)>0 || num(line.useStockQty)>0 || num(line.addQty)>0 || num(line.orderQty)>0); }
function mergeSpecialLines(baseLines, specialLines){
  const map = new Map((baseLines||[]).map(l=>[l.code, normalizeItemLine(l)]));
  (specialLines||[]).forEach(raw=>{
    if(!isSpecialItem(raw?.code)) return;
    map.set(raw.code, normalizeSpecialLine(raw));
  });
  const ordered=state.settings.items.filter(i=>i.active!==false).map(i=>map.get(i.code) || normalizeItemLine({code:i.code,price:i.price}));
  const known=new Set(ordered.map(l=>l.code));
  (baseLines||[]).forEach(raw=>{ if(!known.has(raw.code)) ordered.push(normalizeItemLine(raw)); });
  return ordered;
}

function applyBasicSet(modal){
  const basic = {MATTRESS:1, QUILT:1, PILLOW:1, CLOSET:1, TOILETRIES:1};
  const area = $('#f_isStockOrder',modal)?.checked ? $('.stock-item-section',modal) : $('.worker-order-section',modal);
  $all('tr[data-code]',area||modal).forEach(tr=>{
    const code=tr.dataset.code;
    tr.querySelector('.line-order').value = basic[code] || 0;
    tr.querySelector('.line-add').value = 0;
    tr.querySelector('.line-use-stock').value = 0;
  });
  toast('已套用基本寢具');
}
function readLinesFromRoot(root){
  return $all('tr[data-code]', root).map(tr=>({
    code: tr.dataset.code,
    price: num(tr.querySelector('.line-price')?.value),
    orderQty: num(tr.querySelector('.line-order')?.value),
    addQty: num(tr.querySelector('.line-add')?.value),
    returnQty: 0,
    useStockQty: num(tr.querySelector('.line-use-stock')?.value),
    stockInQty: 0,
    replenishQty: 0,
    returnToStockQty: 0,
    note: tr.querySelector('.line-note')?.value || ''
  }));
}
function readWorkerGroupsFromModal(modal){
  return $all('.worker-card', modal).map(card=>({
    id: card.dataset.groupId || uid('WG'),
    name: $('.wg-name',card)?.value.trim() || '',
    nationality: $('.wg-nationality',card)?.value || '越南',
    entryDate: $('.wg-entryDate',card)?.value || '',
    items: readLinesFromRoot(card)
  })).filter(g=>g.name || (g.items||[]).some(l=>lineQty(l)>0 || supplierQty(l)>0 || num(l.useStockQty)>0 || num(l.addQty)>0));
}
function saveOrderFromModal(id, isExisting, modal){
  const order = isExisting ? (state.orders.find(o=>o.id===id) || createBlankOrder()) : createBlankOrder();
  const beforeOrder = isExisting ? snapshotOrder(order) : null;
  const oldItems = order.items || [];
  order.isStockOrder = !!$('#f_isStockOrder', modal)?.checked;
  const fields = ['dept','staff','employer','orderDate','companyTitle','paymentTarget','deliveryDate','deliveryHour','deliveryPlace','contact','deliveryAddress','receivedDate','status','note'];
  const map = {dept:'f_dept',staff:'f_staff',employer:'f_employer',orderDate:'f_orderDate',companyTitle:'f_companyTitle',paymentTarget:'f_paymentTarget',deliveryDate:'f_deliveryDate',deliveryHour:'f_deliveryHour',deliveryPlace:'f_deliveryPlace',contact:'f_contact',deliveryAddress:'f_deliveryAddress',receivedDate:'f_receivedDate',status:'f_status',note:'f_note'};
  fields.forEach(k=>{ order[k] = modal.querySelector('#'+map[k])?.value || ''; });
  order.provideDate = order.orderDate;
  if(order.isStockOrder){
    order.employer=KANG_PLACE; order.worker=''; order.workerGroups=[]; order.nationality=''; order.entryDate='';
    order.items = readLinesFromRoot($('.stock-item-section', modal));
  }else{
    const groups = readWorkerGroupsFromModal(modal);
    const specialLines = $('.special-bed-section', modal) ? readLinesFromRoot($('.special-bed-section', modal)).map(normalizeSpecialLine) : [];
    const hasWorkerItems = groups.some(g=>(g.items||[]).some(l=>positiveLineQty(l)));
    const hasSpecialItems = specialLines.some(l=>positiveLineQty(l));
    if(!groups.length && !hasSpecialItems) return toast('請至少輸入一位工人或特殊訂購項目');
    if(groups.length && !hasWorkerItems && !hasSpecialItems) return toast('請輸入至少一個訂購品項');
    order.workerGroups = groups;
    order.worker = groups.map(g=>g.name).filter(Boolean).join('\n');
    order.nationality = groups[0]?.nationality || '';
    order.entryDate = groups[0]?.entryDate || '';
    order.items = mergeSpecialLines(aggregateWorkerItems(groups, oldItems), specialLines);
  }
  if(!isExisting || !order.orderNo || String(order.orderNo).startsWith('BO')) order.orderNo = makeOrderNo(order.companyTitle, order.dept, order.orderDate, isExisting ? order.id : '');
  order.batchNo = '';
  order.workerEnglish = '';
  if(!order.accountingBatch) order.overseasStaff = order.staff || '';
  if(order.deliveryPlace===KANG_PLACE){ order.contact = staffContact(order.staff); order.deliveryAddress = KANG_ADDRESS; }
  if(!isExisting){ state.orders.push(order); }
  if(order.employer && !state.settings.employers.includes(order.employer)) state.settings.employers.push(order.employer);
  audit(isExisting?'修改訂購':'新增訂購','訂購單',order.id,order.orderNo,`${order.employer||''}｜${workerDisplay(order)}｜${money(orderAmount(order))}`,beforeOrder);
  save(); closeModal(); toast('訂購資料已儲存'); render();
}
function deleteOrder(id){
  const order = state.orders.find(o=>o.id===id);
  if(!order) return;
  if(!confirm('確定要刪除此筆訂購資料？刪除後可到「控管資訊」救回。')) return;
  state.deletedOrders = Array.isArray(state.deletedOrders) ? state.deletedOrders : [];
  state.deletedOrders.unshift({id:uid('DEL'), deletedAt:nowStamp(), deletedBy:'共用網址', order:snapshotOrder(order)});
  state.orders = state.orders.filter(o=>o.id!==id);
  audit('刪除訂購','訂購單',order.id,order.orderNo,`${order.employer||''}｜${workerDisplay(order)}｜可救回`,order);
  save(); closeModal(); toast('已刪除，可於控管資訊救回'); render();
}

function renderRecords(root){
  const q = (state.filters.records || '').trim().toLowerCase();
  const hideClosed = !!state.filters.hideClosed;
  const orders = state.orders.filter(o=>{
    const hit = !q || [o.orderNo,o.dept,o.staff,o.employer,o.worker,o.nationality,entryDateDisplay(o),displayStatus(o),itemSummary(o),deliveryContact(o),deliveryAddress(o),o.isStockOrder?'訂庫存':'工人訂購'].some(v=>String(v||'').toLowerCase().includes(q));
    const show = !hideClosed || !['對帳完成','帳務錯誤'].includes(displayStatus(o));
    return hit && show;
  }).sort((a,b)=>String(b.orderDate||'').localeCompare(String(a.orderDate||'')) || String(b.orderNo||'').localeCompare(String(a.orderNo||'')));
  root.innerHTML = `
    <div class="toolbar"><div class="toolbar-left"><input id="recordsSearch" placeholder="搜尋訂購單 / 部門 / 承辦 / 雇主 / 工人 / 品項" value="${esc(state.filters.records||'')}"><label class="checkline"><input type="checkbox" id="hideClosedRecords" ${hideClosed?'checked':''}><strong>隱藏對帳完成 / 帳務錯誤</strong></label></div><div class="toolbar-right">${exportDateFilterHTML()}<button id="exportRecordsBtn">匯出詳細 CSV</button></div></div>
    <div class="card plain">
      <div class="card-title"><h2>訂購紀錄</h2><span class="subtle">點選訂購單號即可查看；其他操作請進入訂單後使用</span></div>
      ${orders.length ? `<div class="table-wrap"><table class="record-table"><thead><tr><th>訂購單</th><th>部門 / 承辦</th><th>雇主 / 工人</th><th>入境日 / 國籍</th><th>支付對象</th><th>購買品項</th><th>退貨狀況</th><th class="right">金額</th><th>目前狀態</th></tr></thead><tbody>${orders.map(o=>workerRecordHTML(o)).join('')}</tbody></table></div>` : `<div class="empty">尚無訂購紀錄。</div>`}

  $('#recordsSearch')?.addEventListener('input',e=>{state.filters.records=e.target.value;save();renderRecords(root);});
  $('#hideClosedRecords')?.addEventListener('change',e=>{state.filters.hideClosed=e.target.checked;save();renderRecords(root);});
  $('#exportRecordsBtn')?.addEventListener('click', exportRecordsCSV);
  bindExportDateFilter(renderRecords, root);
  $all('[data-record-act="view"]').forEach(btn=>btn.addEventListener('click',()=>openRecordDetailModal(btn.dataset.id)));
}

function openReturnToStockModal(orderId){
  const o=state.orders.find(x=>x.id===orderId); if(!o) return;
  if(!can('orderWrite')) return toast('目前無法辦理退貨');
  const lines=orderedLines(o.items||[]).filter(l=>isGeneralItem(l.code) && returnableQty(l)>0);
  if(!lines.length) return toast('此筆沒有可退貨入庫的品項');
  const rows=lines.map(l=>{
    const it=getItem(l.code);
    return `<tr data-return-code="${esc(l.code)}">
      <td><b>${esc(it.name)}</b><br><span class="muted">${esc(it.spec||'')}</span></td>
      <td class="right">${returnableQty(l)}</td>
      <td class="right">${esc(it.unit||'')}</td>
      <td><input type="number" min="0" step="1" max="${returnableQty(l)}" class="return-qty" value="0"></td>
      <td><input class="return-note" placeholder="退貨原因 / 備註"></td>
    </tr>`;
  }).join('');
  showModal(`退貨入庫｜${o.orderNo}`, `
    <div class="mini-note" style="margin-bottom:10px">請選擇退貨品項與數量；儲存後會同步更新退貨數量、金額，並將退貨品項入庫存。</div>
    <div class="scroll-x"><table class="item-table"><thead><tr><th>品項</th><th class="right">可退數量</th><th>單位</th><th>退貨數量</th><th>備註</th></tr></thead><tbody>${rows}</tbody></table></div>`,{
    width:'880px',
    footer:`<button id="cancelModalBtn">取消</button><button class="primary" id="saveReturnBtn">儲存退貨入庫</button>`,
    onOpen:(modal)=>{
      $('#cancelModalBtn',modal).addEventListener('click',closeModal);
      $('#saveReturnBtn',modal).addEventListener('click',()=>{
        let total=0; const updates=[];
        $all('tr[data-return-code]',modal).forEach(tr=>{
          const code=tr.dataset.returnCode;
          const line=(o.items||[]).find(l=>l.code===code);
          if(!line) return;
          const qty=num($('.return-qty',tr).value);
          const max=returnableQty(line);
          const note=$('.return-note',tr).value || '';
          if(qty<0) return;
          if(qty>max){ updates.push({error:`${itemLabel(code)} 退貨數量不可超過 ${max}`}); return; }
          if(qty>0) updates.push({line,qty,note});
        });
        const err=updates.find(u=>u.error);
        if(err) return toast(err.error);
        if(!updates.length) return toast('請輸入至少一個退貨數量');
        updates.forEach(u=>{
          u.line.returnQty = num(u.line.returnQty) + u.qty;
          u.line.returnToStockQty = num(u.line.returnToStockQty) + u.qty;
          const stamp = `退貨入庫 ${today()} x${u.qty}${u.note ? '：'+u.note : ''}`;
          u.line.note = [u.line.note||'', stamp].filter(Boolean).join(' / ');
          total += u.qty;
        });
        o.returnedAt = todayInput();
        if(o.status==='對帳完成') o.status='已收貨';
        save(); closeModal(); toast(`已退貨入庫 ${total} 件`); render();
      });
    }
  });
}
function openAddPurchaseFlow(orderId){

  const useStock = confirm('這次加買是否直接拿庫存？\n\n確定＝拿庫存\n取消＝新增一張加買訂購單');
  if(useStock) return openAddFromStockModal(orderId);
  const addOrder = createBlankOrder();
  addOrder.dept=o.dept; addOrder.staff=o.staff; addOrder.employer=o.employer; addOrder.companyTitle=o.companyTitle; addOrder.paymentTarget=o.paymentTarget||'雇主';
  addOrder.deliveryPlace=o.deliveryPlace; addOrder.contact=o.contact; addOrder.deliveryAddress=o.deliveryAddress; addOrder.orderDate=todayInput(); addOrder.status='已下單'; addOrder.note=`加買來源：${o.orderNo}`;
  addOrder.orderNo=makeOrderNo(addOrder.companyTitle, addOrder.dept, addOrder.orderDate);
  if(!o.isStockOrder){

    addOrder.items=createEmptyItemLines(i=>isGeneralItem(i));
  }
  state.orders.push(addOrder); save(); closeModal(); toast('已建立加買訂購單，請填寫加買品項'); openOrderModal(addOrder.id);
}
function openAddFromStockModal(orderId){
  const o=state.orders.find(x=>x.id===orderId); if(!o) return;
  const groups=orderWorkerGroups(o);
  const targetSelect = (!o.isStockOrder && groups.length>1) ? `<div style="margin-bottom:10px"><label>加買對象</label><select id="add_stock_worker">${groups.map((g,i)=>`<option value="${i}">${esc(g.name||('工人'+(i+1)))}</option>`).join('')}</select></div>` : '';
  const rows=state.settings.items.filter(i=>i.active!==false && isGeneralItem(i)).map(i=>`<tr data-add-code="${esc(i.code)}"><td><b>${esc(i.name)}</b><br><span class="muted">庫存 ${currentStock(i.code)}｜${esc(i.spec||'')}</span></td><td class="right">${money(i.price)}</td><td><input type="number" min="0" step="1" class="add-stock-qty" value="0"></td><td><input class="add-stock-note" placeholder="備註"></td></tr>`).join('');
  showModal(`加買拿庫存｜${o.orderNo}`, `${targetSelect}<div class="scroll-x"><table class="item-table"><thead><tr><th>品項</th><th class="right">工人訂購價</th><th>拿庫存數量</th><th>備註</th></tr></thead><tbody>${rows}</tbody></table></div>`,{
    width:'880px',
    footer:`<button id="cancelModalBtn">取消</button><button class="primary" id="saveAddStockBtn">儲存加買拿庫存</button>`,
    onOpen:(modal)=>{
      $('#cancelModalBtn',modal).addEventListener('click',closeModal);
      $('#saveAddStockBtn',modal).addEventListener('click',()=>{
        let total=0;
        const updates=[];
        $all('tr[data-add-code]',modal).forEach(tr=>{
          const qty=num($('.add-stock-qty',tr)?.value); if(qty<=0) return;
          const code=tr.dataset.addCode; const note=$('.add-stock-note',tr)?.value||'';
          updates.push({code,qty,note}); total+=qty;
        });
        if(!updates.length) return toast('請輸入至少一個加買拿庫存數量');
        if(!o.isStockOrder && groups.length){
          const idx=num($('#add_stock_worker',modal)?.value || 0);
          const realGroups=orderWorkerGroups(o);
          const g=realGroups[idx] || realGroups[0];
          updates.forEach(u=>{
            let line=(g.items||[]).find(l=>l.code===u.code);
            if(!line){ line=normalizeItemLine({code:u.code}); g.items.push(line); }
            line.useStockQty=num(line.useStockQty)+u.qty;
            line.note=[line.note||'',`加買拿庫存 ${today()} x${u.qty}${u.note?'：'+u.note:''}`].filter(Boolean).join(' / ');
          });
          o.workerGroups=realGroups;
          o.items=aggregateWorkerItems(realGroups, o.items);
        }else{
          updates.forEach(u=>{
            let line=(o.items||[]).find(l=>l.code===u.code);
            if(!line){ line=normalizeItemLine({code:u.code}); o.items.push(line); }
            line.useStockQty=num(line.useStockQty)+u.qty;
            line.note=[line.note||'',`加買拿庫存 ${today()} x${u.qty}${u.note?'：'+u.note:''}`].filter(Boolean).join(' / ');
          });
        }
        o.note=[o.note||'',`加買拿庫存 ${today()} 共${total}件`].filter(Boolean).join('\n');
        save(); closeModal(); toast(`已加買拿庫存 ${total} 件`); render();
      });
    }
  });

function matrixLineCell(l){
  if(!l || !positiveLineQty(l)) return '<span class="muted">-</span>';
  const parts=[];
  if(num(l.orderQty)>0) parts.push(`訂 ${num(l.orderQty)}`);
  if(num(l.useStockQty)>0) parts.push(`庫 ${num(l.useStockQty)}`);
  if(num(l.addQty)>0) parts.push(`加 ${num(l.addQty)}`);
  if(num(l.returnQty)>0) parts.push(`退 ${num(l.returnQty)}`);
  const note = l.note ? `<span class="mini">${esc(l.note)}</span>` : '';
  return `<div class="matrix-cell">${parts.map(p=>`<span>${esc(p)}</span>`).join('')}${note}</div>`;
}
function matrixItemPrice(groups, code){
  for(const g of groups){
    const l=(g.items||[]).find(x=>x.code===code && positiveLineQty(x));
    if(l) return num(l.price);
  }
  return itemWorkerPrice(code);
}
function workerItemMatrixHTML(o){
  const groups = orderWorkerGroups(o).filter(g=>g.name || (g.items||[]).some(l=>positiveLineQty(l)));
  if(groups.length <= 1) return '';
  const codeSet = new Set();
  groups.forEach(g=>(g.items||[]).forEach(l=>{ if(positiveLineQty(l) && isGeneralItem(l.code)) codeSet.add(l.code); }));
  const codes = state.settings.items.filter(i=>codeSet.has(i.code)).map(i=>i.code);
  if(!codes.length) return '';
  const header = codes.map(code=>{
    const it=getItem(code);
    return `<th><b>${esc(it.name)}</b><span class="matrix-item-price">${money(matrixItemPrice(groups, code))}</span></th>`;
  }).join('');
  const body = groups.map(g=>{
    const map = new Map((g.items||[]).map(l=>[l.code,l]));
    return `<tr>
      <td><b>${esc(g.name||'-')}</b><div class="worker-meta">${esc(g.nationality||'-')}｜${esc(dateSlash(g.entryDate)||'-')}｜${money(groupAmount(g))}</div></td>
      ${codes.map(code=>`<td>${matrixLineCell(map.get(code))}</td>`).join('')}
    </tr>`;
  }).join('');
  return `<div class="record-worker-section">
    <h4>工人 × 訂購項目</h4>
    <div class="scroll-x"><table class="item-table worker-item-matrix"><thead><tr><th>工人</th>${header}</tr></thead><tbody>${body}</tbody></table></div>
  </div>`;
}

function renderAccounting(root){
  const q = (state.filters.accounting || '').trim().toLowerCase();
  const grouped = {};
  state.orders.filter(o=>o.accountingBatch).filter(o=>{
    if(!q) return true;
    return [o.accountingBatch,o.orderNo,o.dept,o.staff,o.employer,o.worker,o.nationality,o.companyTitle,o.paymentTarget,o.accountingStatus,o.accountingBy,o.billingDate,o.orderDate,itemSummary(o),o.isStockOrder?'訂庫存':'工人訂購'].some(v=>String(v||'').toLowerCase().includes(q));
  }).forEach(o=>{
    grouped[o.accountingBatch] = grouped[o.accountingBatch] || [];
    grouped[o.accountingBatch].push(o);
  });
  const batches = Object.entries(grouped).sort((a,b)=>b[0].localeCompare(a[0]));
  const allRows = batches.flatMap(([,orders])=>orders);
  const overviewTotal = allRows.reduce((s,o)=>s+accountingAmount(o),0);
  root.innerHTML = `
    <div class="accounting-overview"><div class="big-stat"><span>對帳批次</span><b>${batches.length}</b></div><div class="big-stat"><span>對帳筆數</span><b>${allRows.length}</b></div><div class="big-stat"><span>對帳總金額</span><b>${money(overviewTotal)}</b></div></div>

  $('#accountingSearch')?.addEventListener('input', e=>{state.filters.accounting=e.target.value;save();renderAccounting(root);});
  $('#exportAccountingBtn')?.addEventListener('click', exportAccountingCSV);
  bindExportDateFilter(renderAccounting, root);
  $all('[data-confirm-batch]').forEach(btn=>btn.addEventListener('click',()=>confirmAccountingBatch(btn.dataset.confirmBatch)));
  $all('[data-error-batch]').forEach(btn=>btn.addEventListener('click',()=>openAccountingErrorModal(btn.dataset.errorBatch)));
  $all('[data-account-edit]').forEach(btn=>btn.addEventListener('click',()=>openAccountingEditModal(btn.dataset.accountEdit)));
  $all('[data-account-adjust]').forEach(btn=>btn.addEventListener('click',()=>openAccountingEditModal(btn.dataset.accountAdjust, true)));
  $all('[data-account-note]').forEach(btn=>btn.addEventListener('click',()=>openAccountingNoteModal(btn.dataset.accountNote)));
  $all('[data-account-remove]').forEach(btn=>btn.addEventListener('click',()=>removeFromAccounting(btn.dataset.accountRemove)));
  $all('[data-account-view]').forEach(btn=>btn.addEventListener('click',()=>openRecordDetailModal(btn.dataset.accountView)));
}

function confirmAccountingBatch(batch){
  const orders = state.orders.filter(o=>o.accountingBatch===batch);
  const total = orders.reduce((s,o)=>s+accountingAmount(o),0);
  if(!orders.length) return toast('此批次沒有資料');
  const defaultBy = orders.find(o=>o.accountingBy)?.accountingBy || '';
  const by = prompt(`確定整批確認帳款？
批次：${batch}
筆數：${orders.length} 筆
對帳總金額：${money(total)}

  if(by===null) return;

}

function availableStatYears(){
  const set = new Set([String(new Date().getFullYear())]);
  state.orders.forEach(o=>{ const y=String(o.orderDate||'').slice(0,4); if(/^\d{4}$/.test(y)) set.add(y); });
  return Array.from(set).sort((a,b)=>b.localeCompare(a));
}
function filteredStatOrders(){
  const mode = state.filters.statsMode || 'month';
  return state.orders.filter(o=>{
    const d = String(o.orderDate||'');
    if(mode==='year') return d.slice(0,4) === String(state.filters.statsYear || new Date().getFullYear());
    if(mode==='month') return d.slice(0,7) === String(state.filters.statsMonth || todayInput().slice(0,7));
    if(mode==='range'){
      const start = state.filters.statsStart || '';
      const end = state.filters.statsEnd || '';
      if(start && d < start) return false;
      if(end && d > end) return false;
      return !!d;
    }
    return true;
  });
}
function statsRangeLabel(){
  const mode = state.filters.statsMode || 'month';
  if(mode==='year') return `${state.filters.statsYear || new Date().getFullYear()} 年`;
  if(mode==='month') return `${String(state.filters.statsMonth || todayInput().slice(0,7)).replace('-',' 年 ')} 月`;
  const s = state.filters.statsStart ? dateSlash(state.filters.statsStart) : '最早';
  const e = state.filters.statsEnd ? dateSlash(state.filters.statsEnd) : '今日';
  return `${s} ～ ${e}`;
}

function restoreDeletedOrder(deleteId){
  const deleted = (state.deletedOrders||[]).find(d=>d.id===deleteId);
  if(!deleted || !deleted.order) return;
  if(!confirm(`確定救回訂購單 ${deleted.order.orderNo||''}？`)) return;
  const restored = snapshotOrder(deleted.order);
  if(state.orders.some(o=>o.id===restored.id)) restored.id = uid('ORD');
  state.orders.push(restored);
  state.deletedOrders = (state.deletedOrders||[]).filter(d=>d.id!==deleteId);
  audit('救回訂購','訂購單',restored.id,restored.orderNo,`${restored.employer||''}｜${workerDisplay(restored)}`);
  save(); toast('已救回訂購單'); renderControlInfo($('#content'));
}
function purgeDeletedOrder(deleteId){
  const deleted = (state.deletedOrders||[]).find(d=>d.id===deleteId);
  if(!deleted) return;
  if(!confirm('確定永久移除？移除後無法再救回。')) return;
  state.deletedOrders = (state.deletedOrders||[]).filter(d=>d.id!==deleteId);
  audit('永久移除刪除資料','訂購單',deleted.order?.id,deleted.order?.orderNo,'已從刪除救回清單移除');
  save(); toast('已永久移除'); renderControlInfo($('#content'));
}
function exportAuditCSV(){
  const rows=[['時間','來源','動作','對象','ID','名稱/單號','內容']];

  downloadBlob('FOR-e寢具訂購_控管異動紀錄_'+todayInput()+'.csv', toCSV(rows), 'text/csv;charset=utf-8');
}

function moveSettingItem(code,direction){
  const idx=state.settings.items.findIndex(i=>i.code===code);
  if(idx<0) return;
  const target=direction==='up'?idx-1:idx+1;
  if(target<0 || target>=state.settings.items.length) return;
  const [item]=state.settings.items.splice(idx,1);
  state.settings.items.splice(target,0,item);
  audit('調整品項順序','品項',code,item.name,`${direction==='up'?'上移':'下移'}至第 ${target+1} 順位`);
  save(); toast('品項順序已更新'); renderSettings($('#content'));
}

function saveVendorFromModal(id, modal){
  const data = {
    id: id || uid('V'),
    companyName: $('#vendor_companyName',modal).value.trim(),
    companyAddress: $('#vendor_companyAddress',modal).value.trim(),
    contactPerson: $('#vendor_contactPerson',modal).value.trim(),
    phone: $('#vendor_phone',modal).value.trim(),
    mobile: $('#vendor_mobile',modal).value.trim(),
    fax: $('#vendor_fax',modal).value.trim(),
    line: $('#vendor_line',modal).value.trim(),
    email: $('#vendor_email',modal).value.trim()
  };
  if(!data.companyName){ alert('請輸入公司名稱'); return; }
  state.settings.vendors = Array.isArray(state.settings.vendors) ? state.settings.vendors : [];
  const idx = state.settings.vendors.findIndex(v=>v.id===id);
  const beforeVendor = idx>=0 ? JSON.parse(JSON.stringify(state.settings.vendors[idx])) : null;

function drawCenteredWrap(ctx, text, x, y, maxWidth, lineHeight, maxLines=2){
  text=String(text||'');
  if(!text) return;
  const oldAlign=ctx.textAlign;
  ctx.textAlign='center';
  let line='', lines=[];
  for(let i=0;i<text.length;i++){
    const test=line+text[i];
    if(ctx.measureText(test).width>maxWidth && line){ lines.push(line); line=text[i]; if(lines.length>=maxLines-1){ if(i<text.length-1) line += '…'; break; } }
    else line=test;
  }
  if(line) lines.push(line);
  const startY = y - ((lines.length-1)*lineHeight/2);
  lines.forEach((ln,idx)=>ctx.fillText(ln, x+maxWidth/2, startY+idx*lineHeight));
  ctx.textAlign=oldAlign;
}
function canvasWrapLines(ctx, text, maxWidth){
  text = String(text||'');
  if(!text) return [''];
  const lines=[]; let line='';
  for(let i=0;i<text.length;i++){
    const ch=text[i];
    if(ch==='\n'){ lines.push(line); line=''; continue; }
    const test=line+ch;
    if(ctx.measureText(test).width>maxWidth && line){ lines.push(line); line=ch; }
    else line=test;
  }
  if(line || !lines.length) lines.push(line);
  return lines;
}
function drawCenteredWrapFull(ctx, text, x, y, maxWidth, boxH, lineHeight){
  const oldAlign=ctx.textAlign;
  ctx.textAlign='center';
  const lines=canvasWrapLines(ctx, text, maxWidth);
  const totalH=lines.length*lineHeight;
  let startY=y + Math.max(lineHeight, (boxH-totalH)/2 + lineHeight*.78);
  lines.forEach((ln,idx)=>ctx.fillText(ln, x+maxWidth/2, startY+idx*lineHeight));
  ctx.textAlign=oldAlign;
}
function drawInfoBox(ctx, x, y, w, h, label, value, valueSize=32){
  ctx.strokeRect(x,y,w,h);
  ctx.fillStyle='#555'; ctx.font='bold 18px Noto Sans TC, Microsoft JhengHei, Arial';
  drawCenteredWrap(ctx, label, x+12, y+24, w-24, 20, 1);
  ctx.fillStyle='#111'; ctx.font=`bold ${valueSize}px Noto Sans TC, Microsoft JhengHei, Arial`;
  drawCenteredWrap(ctx, value||'', x+18, y+h/2+18, w-36, valueSize+4, 2);
}
function drawSmallInfo(ctx, x, y, w, h, label, value){

function wrapText(ctx, text, x, y, maxWidth, lineHeight, maxLines=3){
  text=String(text||''); if(!text){return;} let line=''; let lineCount=0;
  for(let i=0;i<text.length;i++){
    const test=line+text[i];
    if(ctx.measureText(test).width>maxWidth && line){ ctx.fillText(line,x,y); line=text[i]; y+=lineHeight; lineCount++; if(lineCount>=maxLines-1){ if(i<text.length-1) line += '…'; break; } } else line=test;
  }
  if(line) ctx.fillText(line,x,y);
}

function bindExportDateFilter(renderFn, root){
  const updateVisibility = ()=>{
    const mode = $('#exportMode')?.value || 'month';
    $all('.export-year-field').forEach(el=>el.style.display = mode==='year' ? '' : 'none');
    $all('.export-month-field').forEach(el=>el.style.display = mode==='month' ? '' : 'none');
    $all('.export-day-field').forEach(el=>el.style.display = mode==='day' ? '' : 'none');
    $all('.export-range-field').forEach(el=>el.style.display = mode==='range' ? '' : 'none');
  };
  const bind = (id, key)=>{
    const el = $('#'+id);
    if(!el) return;
    el.addEventListener('change', e=>{ state.filters[key] = e.target.value; save(); if(id==='exportMode'){ updateVisibility(); } });
  };
  bind('exportMode','exportMode');
  bind('exportYear','exportYear');
  bind('exportMonth','exportMonth');
  bind('exportDay','exportDay');
  bind('exportStart','exportStart');
  bind('exportEnd','exportEnd');

function exportDateMatches(o){
  const f = state.filters;
  const mode = f.exportMode || 'month';
  const d = String(o.orderDate || o.billingDate || '').slice(0,10);
  if(!d) return false;
  if(mode==='year') return d.slice(0,4) === String(f.exportYear || new Date().getFullYear());
  if(mode==='month') return d.slice(0,7) === String(f.exportMonth || todayInput().slice(0,7));
  if(mode==='day') return d === String(f.exportDay || todayInput());
  if(mode==='range'){
    const start = f.exportStart || '';
    const end = f.exportEnd || '';
    return (!start || d >= start) && (!end || d <= end);
  }
  return true;
}
function filteredOrdersForCSV(orders){ return (orders || state.orders).filter(exportDateMatches); }
function exportDateLabel(){
  const f = state.filters, mode = f.exportMode || 'month';
  if(mode==='year') return `${f.exportYear || new Date().getFullYear()}年`;
  if(mode==='month') return `${f.exportMonth || todayInput().slice(0,7)}`;
  if(mode==='day') return `${f.exportDay || todayInput()}`;
  return `${f.exportStart || '最早'}_${f.exportEnd || '今日'}`;
}

function downloadBlob(filename, text, type){ const blob=new Blob([text],{type}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=filename; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),1000); }
